<!DOCTYPE html>

  <!-- Tailwind CDN for quick styling (UI English, comments हिन्दी) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Meta Pixel (head में रखा हुआ) -->

  <!-- (NOTE) यह वही Pixel init है — index/pricing के साथ same ID रखें। -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '1468609891320717'); // Pixel ID — जरूरत हो तो बदल दें
  fbq('track', 'PageView');
  </script>

    <img height="1" width="1" style="display:none"

  <style>

<body class="min-h-screen flex items-center justify-center p-6 bg-slate-50">

        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
        </svg>

    <!-- QR for mobile users -->

      <div class="text-left">
        <p class="text-xs text-slate-500 mb-1 font-medium uppercase">Scan to WhatsApp</p>
        <p class="text-[13px] text-slate-600">Quick message karein — हम contact कर लेंगे।</p>
      </div>
      <img src="https://quickchart.io/qr?text=https%3A%2F%2Fwa.me%2F918059882099%3Ftext%3DHello%2520VJ-Sync%2520Team%252C%2520I%2520completed%2520the%2520demo%2520request.&size=120" alt="WhatsApp QR" class="w-28 h-28 rounded-lg border p-1 bg-white shadow-sm" />

    <p class="text-xs text-slate-400 mt-6">If you need urgent support, WhatsApp us or call 8059882099.</p>
  </main>

  <!-- NEW: Primary conversion event: Lead (fires on page load) -->
  <!-- हिन्दी टिप्पणी: हमने यहाँ 'CompleteRegistration' की बजाय 'Lead' लगाया है — इससे Meta ads सही तरीके से optimize करेगा -->
  <script>
    (function(){
      try {
        // NEW: Fire Lead event immediately if fbq available
        if(window.fbq) {
          window.fbq('track', 'Lead', { content_name: 'Demo Request Thankyou' }); // NEW
        } else {
          // NEW: अगर fbq अभी load हो रहा है तो load पर भेज दो
          window.addEventListener('load', function(){
            if(window.fbq) {
              window.fbq('track', 'Lead', { content_name: 'Demo Request Thankyou' }); // NEW
            }
          }, { once: true });
        }
      } catch(err) {
        console.warn('fbq lead track error', err);
      }
    })();
  </script>

</body>
</html>
